name: 🧪 QA Automation CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  # 매일 오전 9시(KST) 자동 실행 — 스케줄 테스트
  schedule:
    - cron: '0 0 * * *'  # UTC 00:00 = KST 09:00
  # 수동 실행 허용
  workflow_dispatch:
    inputs:
      browser:
        description: '테스트 브라우저 선택'
        required: false
        default: 'chromium'
        type: choice
        options:
          - chromium
          - firefox
          - webkit
          - all

jobs:
  # ──────────────────────────────────────────────────────────
  # E2E + API 테스트
  # ──────────────────────────────────────────────────────────
  test:
    name: 🧪 Playwright Tests (${{ matrix.browser }})
    runs-on: ubuntu-latest
    timeout-minutes: 30

    strategy:
      fail-fast: false
      matrix:
        browser: [chromium, firefox, webkit]

    steps:
      - name: 📥 코드 체크아웃
        uses: actions/checkout@v4

      - name: 🟢 Node.js 설정 (LTS)
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: 📦 의존성 설치
        run: npm install

      - name: 🎭 Playwright 브라우저 설치
        run: npx playwright install --with-deps ${{ matrix.browser }}

      - name: 🏃 E2E 테스트 실행
        run: npx playwright test tests/e2e --project=${{ matrix.browser }}
        env:
          CI: true

      - name: 🔌 API 테스트 실행
        run: npx playwright test tests/api --project=${{ matrix.browser }}
        if: matrix.browser == 'chromium'  # API 테스트는 Chrome 1회만

      - name: 📊 테스트 리포트 업로드 (실패 시)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-${{ matrix.browser }}
          path: |
            playwright-report/
            test-results/
          retention-days: 7

      - name: 📸 스크린샷 업로드 (실패 시)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: screenshots-${{ matrix.browser }}
          path: test-results/**/*.png
          retention-days: 7

  # ──────────────────────────────────────────────────────────
  # 테스트 결과 요약 댓글 (PR에 자동 첨부)
  # ──────────────────────────────────────────────────────────
  comment:
    name: 📝 PR 결과 댓글
    needs: test
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' && always()

    steps:
      - name: ✅ 테스트 결과 댓글 작성
        uses: actions/github-script@v7
        with:
          script: |
            const status = '${{ needs.test.result }}' === 'success' ? '✅ 모든 테스트 통과!' : '❌ 테스트 실패 — 리포트를 확인하세요.';
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## 🧪 QA Automation 결과\n\n${status}\n\n자세한 결과는 [Actions 탭](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId})에서 확인하세요.`
            })
