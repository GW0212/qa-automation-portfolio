name: 🧪 QA Automation CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  test:
    name: 🧪 Playwright Tests (${{ matrix.browser }})
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        browser: [chromium, firefox, webkit]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install
      - run: npx playwright install --with-deps ${{ matrix.browser }}
      - run: npx playwright test tests/e2e --project=${{ matrix.browser }}
        continue-on-error: true
        env:
          CI: true
      - name: API 테스트
        if: matrix.browser == 'chromium'
        run: npx playwright test tests/api --project=chromium
        continue-on-error: true
        env:
          CI: true
      - uses: actions/upload-artifact@v4
        with:
          name: report-${{ matrix.browser }}
          path: playwright-report/
          retention-days: 7

  deploy-report:
    name: 📄 GitHub Pages 배포
    needs: test
    runs-on: ubuntu-latest
    if: always()
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install
      - run: npx playwright install --with-deps chromium
      - run: npx playwright test tests/e2e tests/api --project=chromium
        continue-on-error: true
        env:
          CI: true
      - name: 배포 폴더 구성
        run: |
          mkdir -p deploy/report
          cp docs/index.html deploy/index.html
          if [ -d "playwright-report" ] && [ "$(ls -A playwright-report)" ]; then
            cp -r playwright-report/. deploy/report/
          else
            echo "<html><body>리포트 생성 중...</body></html>" > deploy/report/index.html
          fi
      - uses: actions/configure-pages@v4
      - uses: actions/upload-pages-artifact@v3
        with:
          path: deploy/
      - id: deployment
        uses: actions/deploy-pages@v4
