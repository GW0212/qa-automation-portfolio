name: 🧪 QA Automation CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  test:
    name: 🧪 Playwright Tests (${{ matrix.browser }})
    runs-on: ubuntu-latest
    timeout-minutes: 30

    strategy:
      fail-fast: false
      matrix:
        browser: [chromium, firefox, webkit]

    steps:
      - name: 📥 코드 체크아웃
        uses: actions/checkout@v4

      - name: 🟢 Node.js 설정
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 📦 의존성 설치
        run: npm install

      - name: 🎭 Playwright 브라우저 설치
        run: npx playwright install --with-deps ${{ matrix.browser }}

      - name: 🏃 E2E 테스트 실행
        run: npx playwright test tests/e2e --project=${{ matrix.browser }}
        env:
          CI: true

      - name: 🔌 API 테스트 실행
        if: matrix.browser == 'chromium'
        run: npx playwright test tests/api --project=${{ matrix.browser }}
        env:
          CI: true

      - name: 📊 테스트 리포트 업로드
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-${{ matrix.browser }}
          path: playwright-report/
          retention-days: 7
